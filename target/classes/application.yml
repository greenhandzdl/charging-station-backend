server:
  port: 8080

spring:
  application:
    name: charging-station-backend
  profiles:
    active: dev

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.charging.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helper-dialect: postgresql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# JWT Configuration
jwt:
  access-token-expiration: 900000  # 15 minutes in milliseconds
  refresh-token-expiration: 604800000  # 7 days in milliseconds
  secret: ${JWT_SECRET:charging-station-default-secret-key-change-in-production-32chars}

# Payment Gateway
payment:
  gateway:
    mock-url: http://localhost:9999/mock-gateway
    callback-url: http://localhost:8080/api/v1/payments/callback
  hmac-secret: ${PAYMENT_HMAC_SECRET:default-hmac-secret-change-in-production}
  wechat-api-key: ${WECHAT_API_KEY:wechat-default-key}
  alipay-api-key: ${ALIPAY_API_KEY:alipay-default-key}

# Charging business rules
charging:
  min-balance: 10.00
  arrears-freeze-days: 30

logging:
  level:
    com.charging: DEBUG
    org.springframework.security: DEBUG