server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: charging-station-backend
  profiles:
    active: dev
  config:
    import: optional:config/

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.charging.entity
  type-handlers-package: com.charging.infrastructure.config
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helper-dialect: postgresql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# JWT Configuration
jwt:
  access-token-expiration: 900000  # 15 minutes in milliseconds
  refresh-token-expiration: 604800000  # 7 days in milliseconds

# Payment Gateway
payment:
  gateway:
    mock-url: http://localhost:9999/mock-gateway
    callback-url: http://localhost:8080/api/payments/callback

# Charging business rules
charging:
  min-balance: 10.00
  arrears-freeze-days: 30

logging:
  level:
    com.charging: DEBUG
    org.springframework.security: DEBUG