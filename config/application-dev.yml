spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:30001}/${DB_NAME:charging_station}
    username: ${DB_USERNAME:cs_user}
    password: ${DB_PASSWORD:dev_password_123}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:30002}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-not-for-production-use-32chars!!}

payment:
  hmac-secret: ${PAYMENT_HMAC_SECRET:default-hmac-secret-change-in-production}
  wechat-api-key: ${WECHAT_API_KEY:wechat-default-key}
  alipay-api-key: ${ALIPAY_API_KEY:alipay-default-key}